---
name: Update modules

on:
  workflow_dispatch:

jobs:
  update-modules:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: "false"
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"
          check-latest: true
          cache: true
      - name: go get -u=patch
        run: go get -u=patch
      - name: go mod tidy
        run: go mod tidy
      - name: Build binary
        run: |
          env GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -buildvcs=false \
              -buildmode=exe \
              -ldflags "-s -w -extldflags -static" \
              -tags 'static_build' \
              -o bootstrap
      - name: Run tests
        run: go test -v ./...
      - name: Setup git config
        run: |
          git --no-pager config user.email 'github@github.com'
          git --no-pager config user.name 'GitHub Build'
      - name: git checkout -b
        run: git --no-pager checkout -b fix/${{ github.run_number }}
      - name: git commit
        run: |
          git --no-pager commit --all --message 'fix: update module versions ${{ github.run_number }}'
      - name: git push
        run: git --no-pager push --set-upstream origin $(git branch --show-current)
      - name: Create a PR
        run: gh pr create --fill
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
